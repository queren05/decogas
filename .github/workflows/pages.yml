# Despliegue automático a GitHub Pages en cada push a main.
# Desde la migración a Astro: construye web/ y publica web/dist.
name: Desplegar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild semanal (lunes 05:30 UTC) para que las fichas de producto
    # generadas desde Supabase no se queden desfasadas sin pushes.
    - cron: '30 5 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Instalar dependencias
        run: npm ci
        working-directory: web
      - name: Construir el sitio (Astro)
        run: npm run build
        working-directory: web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
